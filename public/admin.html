<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drova Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: white; min-height: 100vh; }

    .topbar {
      background: #111;
      border-bottom: 1px solid #1c1c1c;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .topbar-left { display: flex; align-items: center; gap: 16px; }
    .topbar img { height: 28px; filter: brightness(0) invert(1); }
    .topbar-title { font-size: 13px; font-weight: 700; color: #f59e0b; letter-spacing: 1px; text-transform: uppercase; }
    .logout-btn {
      background: none; border: 1px solid #2a2a2a; color: #555;
      padding: 7px 16px; border-radius: 7px; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: border-color 0.2s, color 0.2s;
    }
    .logout-btn:hover { border-color: #444; color: #aaa; }

    .content { max-width: 900px; margin: 0 auto; padding: 40px 32px; }

    h2 { font-size: 18px; font-weight: 800; margin-bottom: 4px; }
    .section-sub { font-size: 13px; color: #444; margin-bottom: 20px; }

    .section { margin-bottom: 48px; }

    .card {
      background: #111;
      border: 1px solid #1c1c1c;
      border-radius: 12px;
      overflow: hidden;
    }

    .entry {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid #1c1c1c;
      gap: 16px;
    }
    .entry:last-child { border-bottom: none; }
    .entry-name { font-size: 15px; font-weight: 700; }
    .entry-business { font-size: 13px; color: #555; margin-top: 2px; }
    .entry-right { text-align: right; flex-shrink: 0; }
    .entry-phone { font-size: 14px; font-weight: 600; }
    .entry-meta { font-size: 12px; color: #444; margin-top: 3px; }
    .badge {
      display: inline-block;
      background: #1c1400;
      color: #f59e0b;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      margin-top: 6px;
    }
    .empty { padding: 40px 24px; text-align: center; color: #333; font-size: 14px; }
    .reset-btn {
      background: none; border: 1px solid #2a2a2a; color: #555;
      padding: 6px 14px; border-radius: 7px; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: border-color 0.2s, color 0.2s; white-space: nowrap;
    }
    .reset-btn:hover { border-color: #ef4444; color: #ef4444; }

    .company-block { border-bottom: 1px solid #1c1c1c; }
    .company-block:last-child { border-bottom: none; }
    .company-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 24px; gap: 16px; cursor: pointer; transition: background 0.15s;
    }
    .company-header:hover { background: #161616; }
    .company-name { font-size: 15px; font-weight: 700; }
    .company-slug { font-size: 12px; color: #444; margin-top: 2px; }
    .company-actions { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .expand-icon { color: #333; font-size: 12px; transition: transform 0.2s; }
    .expand-icon.open { transform: rotate(180deg); }
    .company-detail { display: none; padding: 0 24px 20px; border-top: 1px solid #1c1c1c; }
    .company-detail.open { display: block; }

    .stats-row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; padding: 16px 0; }
    .stat { text-align: center; }
    .stat-val { font-size: 28px; font-weight: 900; color: white; line-height: 1; }
    .stat-val.red { color: #ef4444; }
    .stat-val.green { color: #22c55e; }
    .stat-lbl { font-size: 10px; color: #444; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }

    .job-item {
      background: #0d0d0d; border: 1px solid #1c1c1c; border-radius: 10px;
      padding: 14px 16px; margin-bottom: 8px;
      display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 12px;
    }
    .job-load { font-size: 14px; font-weight: 700; color: white; }
    .job-meta { font-size: 12px; color: #444; margin-top: 2px; }
    .jlbl { font-size: 10px; color: #333; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 3px; }
    .jval { font-size: 12px; color: #666; }
    .jval.ok { color: #22c55e; }
    .jval.fail { color: #ef4444; }
    .status-pill { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; text-transform: uppercase; }
    .status-complete { background: #052e16; color: #22c55e; }
    .status-active { background: #1c1400; color: #f59e0b; }
    @media (max-width: 600px) {
      .stats-row { grid-template-columns: repeat(3, 1fr); }
      .job-item { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-left">
      <img src="/logo.svg" alt="Drova">
      <span class="topbar-title">Admin</span>
    </div>
    <form method="POST" action="/admin/logout">
      <button class="logout-btn" type="submit">Sign out</button>
    </form>
  </div>

  <div class="content">
    <div class="section">
      <h2>Waitlist</h2>
      <p class="section-sub" id="waitlist-sub">Loading…</p>
      <div class="card" id="waitlist-list"><div class="empty">Loading…</div></div>
    </div>

    <div class="section">
      <h2>Companies</h2>
      <p class="section-sub" id="companies-sub">Loading…</p>
      <div class="card" id="companies-list"><div class="empty">Loading…</div></div>

      <div style="margin-top:20px;background:#111;border:1px solid #1c1c1c;border-radius:12px;padding:24px;">
        <h3 style="font-size:15px;font-weight:700;margin-bottom:16px;">Create New Account</h3>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:10px;align-items:end;">
          <div>
            <label style="display:block;font-size:11px;font-weight:700;color:#444;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;">Company Name</label>
            <input id="new-name" type="text" placeholder="Sturgiss Pastoral Co" style="width:100%;padding:10px 12px;background:#0d0d0d;border:1px solid #2a2a2a;border-radius:8px;color:white;font-size:14px;outline:none;">
          </div>
          <div>
            <label style="display:block;font-size:11px;font-weight:700;color:#444;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;">Login Slug</label>
            <input id="new-slug" type="text" placeholder="sturgiss" style="width:100%;padding:10px 12px;background:#0d0d0d;border:1px solid #2a2a2a;border-radius:8px;color:white;font-size:14px;outline:none;">
          </div>
          <div>
            <label style="display:block;font-size:11px;font-weight:700;color:#444;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;">Passcode</label>
            <input id="new-passcode" type="text" placeholder="hay2025" style="width:100%;padding:10px 12px;background:#0d0d0d;border:1px solid #2a2a2a;border-radius:8px;color:white;font-size:14px;outline:none;">
          </div>
          <button onclick="createCompany()" style="padding:10px 20px;background:#f59e0b;color:#0a0a0a;font-size:14px;font-weight:800;border:none;border-radius:8px;cursor:pointer;white-space:nowrap;">Create</button>
        </div>
        <div id="create-error" style="display:none;color:#ef4444;font-size:13px;margin-top:10px;"></div>
      </div>
    </div>
  </div>

  <script>
    function timeAgo(iso) {
      if (!iso) return '';
      const diff = Math.floor((Date.now() - new Date(iso.endsWith('Z') ? iso : iso + 'Z')) / 60000);
      if (diff < 1) return 'just now';
      if (diff < 60) return `${diff}m ago`;
      const h = Math.floor(diff / 60);
      if (h < 24) return `${h}h ago`;
      return `${Math.floor(h / 24)}d ago`;
    }

    function formatDate(iso) {
      if (!iso) return '';
      return new Date(iso.endsWith('Z') ? iso : iso + 'Z').toLocaleDateString([], { day: 'numeric', month: 'short', year: 'numeric' });
    }

    async function loadWaitlist() {
      const res = await fetch('/api/waitlist');
      const entries = await res.json();
      document.getElementById('waitlist-sub').textContent =
        entries.length === 0 ? 'No expressions of interest yet' :
        `${entries.length} expression${entries.length !== 1 ? 's' : ''} of interest`;

      document.getElementById('waitlist-list').innerHTML = entries.length === 0
        ? `<div class="empty">No one on the waitlist yet.</div>`
        : entries.map(e => `
          <div class="entry">
            <div>
              <div class="entry-name">${e.name}</div>
              <div class="entry-business">${e.businessName}</div>
              ${e.jobsPerWeek ? `<div class="badge">${e.jobsPerWeek} jobs/week</div>` : ''}
            </div>
            <div class="entry-right">
              <div class="entry-phone"><a href="tel:${e.phone}" style="color:white;text-decoration:none;">${e.phone}</a></div>
              <div class="entry-meta">${formatDate(e.createdAt)} · ${timeAgo(e.createdAt)}</div>
            </div>
          </div>`).join('');
    }

    async function loadCompanies() {
      const res = await fetch('/api/admin/companies');
      const companies = await res.json();
      document.getElementById('companies-sub').textContent =
        `${companies.length} compan${companies.length !== 1 ? 'ies' : 'y'} registered`;

      document.getElementById('companies-list').innerHTML = companies.length === 0
        ? `<div class="empty">No companies yet.</div>`
        : companies.map(c => `
          <div class="company-block">
            <div class="company-header" onclick="toggleCompany(${c.id}, this)">
              <div>
                <div class="company-name">${c.name}</div>
                <div class="company-slug">Slug: ${c.slug} · Passcode: ${c.passcode}</div>
              </div>
              <div class="company-actions">
                <button class="reset-btn" onclick="event.stopPropagation(); resetCompany(${c.id}, '${c.name}')">Reset data</button>
                <span class="expand-icon">▼</span>
              </div>
            </div>
            <div class="company-detail" id="detail-${c.id}">
              <div style="color:#333;font-size:13px;padding:16px 0;">Click to load…</div>
            </div>
          </div>`).join('');
    }

    async function toggleCompany(id, headerEl) {
      const detail = document.getElementById(`detail-${id}`);
      const icon = headerEl.querySelector('.expand-icon');
      const isOpen = detail.classList.contains('open');
      detail.classList.toggle('open');
      icon.classList.toggle('open');
      if (!isOpen && detail.dataset.loaded !== 'true') {
        detail.innerHTML = `<div style="color:#333;font-size:13px;padding:16px 0;">Loading…</div>`;
        const res = await fetch(`/api/admin/company/${id}/trial`);
        const { stats, jobs, drivers, locations } = await res.json();
        detail.dataset.loaded = 'true';
        detail.innerHTML = `
          <div class="stats-row">
            <div class="stat"><div class="stat-val">${stats.total || 0}</div><div class="stat-lbl">Jobs Created</div></div>
            <div class="stat"><div class="stat-val">${stats.started || 0}</div><div class="stat-lbl">Started</div></div>
            <div class="stat"><div class="stat-val green">${stats.completed || 0}</div><div class="stat-lbl">Completed</div></div>
            <div class="stat"><div class="stat-val">${stats.trackingOpened || 0}</div><div class="stat-lbl">Tracking Opened</div></div>
            <div class="stat"><div class="stat-val">${stats.gotGps || 0}</div><div class="stat-lbl">Got GPS</div></div>
            <div class="stat"><div class="stat-val ${stats.smsFailed ? 'red' : ''}">${stats.smsFailed || 0}</div><div class="stat-lbl">SMS Failures</div></div>
          </div>

          <div style="font-size:11px;font-weight:700;color:#333;text-transform:uppercase;letter-spacing:0.5px;padding:4px 0 10px;">Jobs</div>
          ${jobs.length === 0 ? `<div style="color:#333;font-size:13px;padding:0 0 12px;">No jobs yet.</div>` : jobs.map(j => `
            <div class="job-item">
              <div>
                <div class="job-load">${j.loadDetails || '—'}</div>
                <div class="job-meta">${j.driverName || '—'}${j.customerName ? ' · ' + j.customerName : ''}</div>
                <div style="margin-top:6px;"><span class="status-pill ${j.status === 'complete' ? 'status-complete' : 'status-active'}">${j.status}</span></div>
              </div>
              <div>
                <div class="jlbl">Timeline</div>
                <div class="jval">${j.createdAt ? timeAgo(j.createdAt) + ' ago' : '—'}</div>
                ${j.startedAt ? `<div class="jval" style="margin-top:2px;">Started ${timeAgo(j.startedAt)}</div>` : ''}
                ${j.completedAt ? `<div class="jval ok" style="margin-top:2px;">Done ${timeAgo(j.completedAt)}</div>` : ''}
              </div>
              <div>
                <div class="jlbl">GPS</div>
                <div class="jval ${j.locationUpdateCount ? '' : 'fail'}">${j.locationUpdateCount || 0} updates</div>
                <div class="jlbl" style="margin-top:6px;">Tracking Views</div>
                <div class="jval">${j.trackingViewCount || 0} opens</div>
              </div>
              <div>
                <div class="jlbl">SMS</div>
                <div class="jval ${j.trackingSmsSentAt ? 'ok' : j.trackingSmsFailedAt ? 'fail' : ''}">${j.trackingSmsSentAt ? '✓ Sent' : j.trackingSmsFailedAt ? '✗ Failed' : 'Not sent'}</div>
                <div class="jlbl" style="margin-top:6px;">Driver Link</div>
                <div class="jval">${j.driverLinkOpenCount || 0} opens</div>
              </div>
            </div>`).join('')}

          <div style="font-size:11px;font-weight:700;color:#333;text-transform:uppercase;letter-spacing:0.5px;padding:12px 0 10px;">Drivers (${drivers.length})</div>
          ${drivers.length === 0
            ? `<div style="color:#333;font-size:13px;padding:0 0 12px;">No drivers added yet.</div>`
            : `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px;margin-bottom:12px;">
                ${drivers.map(d => `
                  <div style="background:#0d0d0d;border:1px solid #1c1c1c;border-radius:8px;padding:12px 14px;">
                    <div style="font-size:13px;font-weight:700;color:white;">${d.name}</div>
                    <div style="font-size:11px;color:#444;margin-top:3px;">${d.mobile || '—'}</div>
                    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px;">
                      ${d.licenceClass ? `<span style="font-size:10px;font-weight:700;background:#1a1a00;color:#f59e0b;padding:2px 8px;border-radius:20px;">Class ${d.licenceClass}</span>` : '<span></span>'}
                      <span style="font-size:10px;font-weight:700;color:${d.status === 'active' ? '#22c55e' : '#444'};">${d.status || 'active'}</span>
                    </div>
                  </div>`).join('')}
              </div>`}

          <div style="font-size:11px;font-weight:700;color:#333;text-transform:uppercase;letter-spacing:0.5px;padding:4px 0 10px;">Saved Locations (${locations.length})</div>
          ${locations.length === 0
            ? `<div style="color:#333;font-size:13px;padding:0 0 16px;">No locations saved yet.</div>`
            : `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:8px;margin-bottom:16px;">
                ${locations.map(l => `
                  <div style="background:#0d0d0d;border:1px solid #1c1c1c;border-radius:8px;padding:12px 14px;">
                    <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
                      <span style="font-size:10px;font-weight:700;background:#0f172a;color:#60a5fa;padding:2px 8px;border-radius:20px;">${l.type || 'location'}</span>
                    </div>
                    <div style="font-size:13px;font-weight:700;color:white;">${l.name}</div>
                    <div style="font-size:11px;color:#444;margin-top:3px;">${l.address || '—'}</div>
                  </div>`).join('')}
              </div>`}`;
      }
    }

    async function resetCompany(id, name) {
      if (!confirm(`Reset all data for ${name}?\n\nThis will permanently delete all jobs, drivers, trucks, and locations. This cannot be undone.`)) return;
      const res = await fetch(`/api/admin/company/${id}/reset`, { method: 'DELETE' });
      if (res.ok) {
        const detail = document.getElementById(`detail-${id}`);
        detail.dataset.loaded = 'false';
        detail.classList.remove('open');
        document.querySelector(`#detail-${id}`).previousElementSibling.querySelector('.expand-icon').classList.remove('open');
        alert(`${name} has been reset.`);
      } else { alert('Reset failed.'); }
    }

    async function createCompany() {
      const name = document.getElementById('new-name').value.trim();
      const slug = document.getElementById('new-slug').value.trim().toLowerCase().replace(/\s+/g, '-');
      const passcode = document.getElementById('new-passcode').value.trim();
      const errEl = document.getElementById('create-error');
      errEl.style.display = 'none';
      if (!name || !slug || !passcode) { errEl.textContent = 'All fields are required.'; errEl.style.display = 'block'; return; }
      const res = await fetch('/api/admin/companies', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, slug, passcode })
      });
      if (res.ok) {
        document.getElementById('new-name').value = '';
        document.getElementById('new-slug').value = '';
        document.getElementById('new-passcode').value = '';
        loadCompanies();
      } else {
        const data = await res.json();
        errEl.textContent = data.error || 'Failed to create account.';
        errEl.style.display = 'block';
      }
    }

    loadWaitlist();
    loadCompanies();
  </script>
</body>
</html>

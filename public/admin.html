<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drova Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: white; min-height: 100vh; }

    .topbar {
      background: #111;
      border-bottom: 1px solid #1c1c1c;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .topbar-left { display: flex; align-items: center; gap: 16px; }
    .topbar img { height: 28px; filter: brightness(0) invert(1); }
    .topbar-title { font-size: 13px; font-weight: 700; color: #f59e0b; letter-spacing: 1px; text-transform: uppercase; }
    .logout-btn {
      background: none; border: 1px solid #2a2a2a; color: #555;
      padding: 7px 16px; border-radius: 7px; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: border-color 0.2s, color 0.2s;
    }
    .logout-btn:hover { border-color: #444; color: #aaa; }

    .content { max-width: 900px; margin: 0 auto; padding: 40px 32px; }

    h2 { font-size: 18px; font-weight: 800; margin-bottom: 4px; }
    .section-sub { font-size: 13px; color: #444; margin-bottom: 20px; }

    .section { margin-bottom: 48px; }

    .card {
      background: #111;
      border: 1px solid #1c1c1c;
      border-radius: 12px;
      overflow: hidden;
    }

    .entry {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid #1c1c1c;
      gap: 16px;
    }
    .entry:last-child { border-bottom: none; }
    .entry-name { font-size: 15px; font-weight: 700; }
    .entry-business { font-size: 13px; color: #555; margin-top: 2px; }
    .entry-right { text-align: right; flex-shrink: 0; }
    .entry-phone { font-size: 14px; font-weight: 600; }
    .entry-meta { font-size: 12px; color: #444; margin-top: 3px; }
    .badge {
      display: inline-block;
      background: #1c1400;
      color: #f59e0b;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      margin-top: 6px;
    }
    .empty { padding: 40px 24px; text-align: center; color: #333; font-size: 14px; }
    .reset-btn {
      background: none; border: 1px solid #2a2a2a; color: #555;
      padding: 6px 14px; border-radius: 7px; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: border-color 0.2s, color 0.2s; white-space: nowrap;
    }
    .reset-btn:hover { border-color: #ef4444; color: #ef4444; }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-left">
      <img src="/logo.svg" alt="Drova">
      <span class="topbar-title">Admin</span>
    </div>
    <form method="POST" action="/admin/logout">
      <button class="logout-btn" type="submit">Sign out</button>
    </form>
  </div>

  <div class="content">
    <div class="section">
      <h2>Waitlist</h2>
      <p class="section-sub" id="waitlist-sub">Loading…</p>
      <div class="card" id="waitlist-list"><div class="empty">Loading…</div></div>
    </div>

    <div class="section">
      <h2>Companies</h2>
      <p class="section-sub" id="companies-sub">Loading…</p>
      <div class="card" id="companies-list"><div class="empty">Loading…</div></div>
    </div>
  </div>

  <script>
    function timeAgo(iso) {
      if (!iso) return '';
      const diff = Math.floor((Date.now() - new Date(iso.endsWith('Z') ? iso : iso + 'Z')) / 60000);
      if (diff < 1) return 'just now';
      if (diff < 60) return `${diff}m ago`;
      const h = Math.floor(diff / 60);
      if (h < 24) return `${h}h ago`;
      return `${Math.floor(h / 24)}d ago`;
    }

    function formatDate(iso) {
      if (!iso) return '';
      return new Date(iso.endsWith('Z') ? iso : iso + 'Z').toLocaleDateString([], { day: 'numeric', month: 'short', year: 'numeric' });
    }

    async function loadWaitlist() {
      const res = await fetch('/api/waitlist');
      const entries = await res.json();
      document.getElementById('waitlist-sub').textContent =
        entries.length === 0 ? 'No expressions of interest yet' :
        `${entries.length} expression${entries.length !== 1 ? 's' : ''} of interest`;

      document.getElementById('waitlist-list').innerHTML = entries.length === 0
        ? `<div class="empty">No one on the waitlist yet.</div>`
        : entries.map(e => `
          <div class="entry">
            <div>
              <div class="entry-name">${e.name}</div>
              <div class="entry-business">${e.businessName}</div>
              ${e.jobsPerWeek ? `<div class="badge">${e.jobsPerWeek} jobs/week</div>` : ''}
            </div>
            <div class="entry-right">
              <div class="entry-phone"><a href="tel:${e.phone}" style="color:white;text-decoration:none;">${e.phone}</a></div>
              <div class="entry-meta">${formatDate(e.createdAt)} · ${timeAgo(e.createdAt)}</div>
            </div>
          </div>`).join('');
    }

    async function loadCompanies() {
      const res = await fetch('/api/admin/companies');
      const companies = await res.json();
      document.getElementById('companies-sub').textContent =
        `${companies.length} company${companies.length !== 1 ? 'ies' : ''} registered`;

      document.getElementById('companies-list').innerHTML = companies.length === 0
        ? `<div class="empty">No companies yet.</div>`
        : companies.map(c => `
          <div class="entry">
            <div>
              <div class="entry-name">${c.name}</div>
              <div class="entry-business">/${c.slug}</div>
            </div>
            <div class="entry-right" style="display:flex;align-items:center;gap:16px;">
              <div class="entry-meta">/${c.slug}</div>
              <button class="reset-btn" onclick="resetCompany(${c.id}, '${c.name}')">Reset data</button>
            </div>
          </div>`).join('');
    }

    async function resetCompany(id, name) {
      if (!confirm(`Reset all data for ${name}?\n\nThis will permanently delete all jobs, drivers, trucks, and locations. This cannot be undone.`)) return;
      const res = await fetch(`/api/admin/company/${id}/reset`, { method: 'DELETE' });
      if (res.ok) { alert(`${name} has been reset.`); } else { alert('Reset failed.'); }
    }

    loadWaitlist();
    loadCompanies();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drova — Active Jobs</title>
  <script src="/sidebar.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f0e8; min-height: 100vh; display: flex; }
    .main { margin-left: 220px; flex: 1; }
    .topbar { background: white; padding: 20px 32px; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; }
    .topbar h1 { font-size: 22px; font-weight: 800; color: #1a1a1a; }
    .topbar p { font-size: 13px; color: #aaa; margin-top: 2px; }
    .new-btn { background: #f59e0b; color: white; text-decoration: none; padding: 12px 20px; border-radius: 10px; font-size: 14px; font-weight: 700; }
    .new-btn:hover { background: #d97706; }
    .content { padding: 24px 32px; }
    .count { font-size: 13px; color: #888; font-weight: 600; margin-bottom: 16px; }
    .empty { background: white; border-radius: 16px; border: 1px solid #eee; padding: 80px 20px; text-align: center; }
    .empty-icon { font-size: 52px; margin-bottom: 16px; }
    .empty h3 { font-size: 18px; font-weight: 700; color: #1a1a1a; margin-bottom: 8px; }
    .empty p { font-size: 14px; color: #aaa; margin-bottom: 24px; }
    .empty a { display: inline-block; background: #f59e0b; color: white; text-decoration: none; padding: 13px 28px; border-radius: 10px; font-size: 15px; font-weight: 700; }

    .job-card { background: white; border-radius: 14px; margin-bottom: 14px; border: 1px solid #eee; overflow: hidden; transition: box-shadow 0.2s; }
    .job-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.07); }
    .job-inner { display: grid; grid-template-columns: 200px 1fr 1fr 140px; align-items: center; padding: 20px 24px; gap: 24px; }

    .load-col { display: flex; align-items: center; gap: 12px; }
    .load-icon { width: 48px; height: 48px; border-radius: 50%; background: #fef3c7; display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
    .load-id { font-size: 11px; color: #bbb; font-weight: 600; letter-spacing: 0.5px; margin-bottom: 3px; }
    .load-name { font-size: 16px; font-weight: 800; color: #1a1a1a; margin-bottom: 5px; }
    .in-transit { display: inline-flex; align-items: center; gap: 4px; background: #dcfce7; color: #166534; font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 20px; }
    .status-dot { width: 5px; height: 5px; border-radius: 50%; background: #16a34a; }

    .driver-col { display: flex; align-items: center; gap: 10px; }
    .avatar { width: 40px; height: 40px; border-radius: 50%; background: #f3f4f6; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #555; flex-shrink: 0; }
    .driver-label { font-size: 11px; color: #aaa; margin-bottom: 2px; }
    .driver-name { font-size: 14px; font-weight: 600; color: #1a1a1a; }

    .route-col { display: flex; flex-direction: column; gap: 8px; }
    .route-row { display: flex; align-items: flex-start; gap: 8px; }
    .route-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
    .route-dot.from { background: #f59e0b; }
    .route-dot.to { background: #1a1a1a; }
    .r-label { font-size: 10px; color: #aaa; margin-bottom: 1px; }
    .r-addr { font-size: 13px; font-weight: 500; color: #1a1a1a; }

    .actions-col { display: flex; flex-direction: column; gap: 8px; }
    .btn-track { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 14px; border: 1.5px solid #e5e5e5; border-radius: 8px; font-size: 13px; font-weight: 600; color: #555; text-decoration: none; background: white; cursor: pointer; }
    .btn-track:hover { border-color: #f59e0b; color: #d97706; }
    .btn-done { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 14px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; color: white; background: #f59e0b; cursor: pointer; font-family: inherit; }
    .btn-done:hover { background: #d97706; }

    @media (max-width: 1024px) { .job-inner { grid-template-columns: 180px 1fr 140px; } .driver-col { display: none; } }
    @media (max-width: 768px) { .main { margin-left: 0; } .content { padding: 16px; } .job-inner { grid-template-columns: 1fr; } .route-col { display: none; } .topbar { padding: 16px 20px; } }
  </style>
</head>
<body>
  <div id="sidebar-root"></div>

  <div class="main">
    <div class="topbar">
      <div>
        <h1>Active Jobs</h1>
        <p>Jobs currently in transit</p>
      </div>
      <a href="/" class="new-btn">＋ Create New Job</a>
    </div>
    <div class="content" id="content">
      <div style="padding:40px;text-align:center;color:#aaa;">Loading...</div>
    </div>
  </div>

  <script>
    document.getElementById('sidebar-root').innerHTML = renderSidebar('dispatcher');
    document.head.insertAdjacentHTML('beforeend', `<style>${SIDEBAR_CSS}</style>`);

    function initials(name) { return name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase(); }
    function loadIcon(load) {
      const l = load.toLowerCase();
      if (l.includes('cattle') || l.includes('cow') || l.includes('bull')) return '🐄';
      if (l.includes('sheep') || l.includes('lamb')) return '🐑';
      if (l.includes('horse')) return '🐎';
      if (l.includes('pig')) return '🐷';
      if (l.includes('hay') || l.includes('grain') || l.includes('wheat')) return '🌾';
      return '📦';
    }
    function timeAgo(str) {
      const diff = Math.floor((Date.now() - new Date(str + 'Z')) / 60000);
      if (diff < 1) return 'Just now';
      if (diff < 60) return `${diff}m ago`;
      return `${Math.floor(diff/60)}h ${diff%60}m ago`;
    }

    async function load() {
      const res = await fetch('/jobs');
      const jobs = await res.json();
      const content = document.getElementById('content');

      if (!jobs.length) {
        content.innerHTML = `
          <div class="empty">
            <div class="empty-icon">🚛</div>
            <h3>No active jobs</h3>
            <p>Create a new job to get started</p>
            <a href="/">＋ Create New Job</a>
          </div>`;
        return;
      }

      content.innerHTML = `
        <div class="count">${jobs.length} job${jobs.length !== 1 ? 's' : ''} in transit</div>
        ${jobs.map(j => `
          <div class="job-card" id="job-${j.id}">
            <div class="job-inner">
              <div class="load-col">
                <div class="load-icon">${loadIcon(j.loadDetails)}</div>
                <div>
                  <div class="load-id">JOB #${j.id.toUpperCase()}</div>
                  <div class="load-name">${j.loadDetails}</div>
                  <span class="in-transit"><span class="status-dot"></span> IN TRANSIT</span>
                </div>
              </div>
              <div class="driver-col">
                <div class="avatar">${initials(j.driverName)}</div>
                <div>
                  <div class="driver-label">Driver</div>
                  <div class="driver-name">${j.driverName}</div>
                </div>
              </div>
              <div class="route-col">
                <div class="route-row">
                  <div class="route-dot from"></div>
                  <div><div class="r-label">From</div><div class="r-addr">${j.pickupAddress}</div></div>
                </div>
                <div class="route-row">
                  <div class="route-dot to"></div>
                  <div><div class="r-label">To</div><div class="r-addr">${j.deliveryAddress}</div></div>
                </div>
              </div>
              <div class="actions-col">
                <a class="btn-track" href="/track/${j.id}" target="_blank">🗺 View Tracker</a>
                <button class="btn-done" onclick="complete('${j.id}')">✓ Mark Delivered</button>
              </div>
            </div>
          </div>`).join('')}`;
    }

    async function complete(id) {
      if (!confirm('Mark this job as delivered?')) return;
      await fetch(`/jobs/${id}/complete`, { method: 'POST' });
      const card = document.getElementById(`job-${id}`);
      card.style.opacity = '0.4';
      card.style.pointerEvents = 'none';
      setTimeout(() => { card.remove(); if (!document.querySelectorAll('.job-card').length) load(); }, 500);
    }

    load();
  </script>
</body>
</html>

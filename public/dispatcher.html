<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Drova">
  <meta name="theme-color" content="#1a1a1a">
  <title>Drova — Active Jobs</title>
  <script src="/sidebar.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f0e8; min-height: 100vh; display: flex; }
    .main { margin-left: 220px; flex: 1; }
    .topbar { background: white; padding: 16px 32px 20px; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; }
    .topbar-left { display: flex; flex-direction: column; }
    .topbar-logo { height: 52px; margin-bottom: 8px; }
    .topbar h1 { font-size: 22px; font-weight: 800; color: #1a1a1a; }
    .topbar p { font-size: 13px; color: #aaa; margin-top: 2px; }
    .new-btn { background: #f59e0b; color: white; text-decoration: none; padding: 12px 20px; border-radius: 10px; font-size: 14px; font-weight: 700; }
    .new-btn:hover { background: #d97706; }
    .content { padding: 24px 32px; }
    .count { font-size: 13px; color: #888; font-weight: 600; margin-bottom: 16px; }
    .empty { background: white; border-radius: 16px; border: 1px solid #eee; padding: 80px 20px; text-align: center; }
    .empty-icon { font-size: 52px; margin-bottom: 16px; }
    .empty h3 { font-size: 18px; font-weight: 700; color: #1a1a1a; margin-bottom: 8px; }
    .empty p { font-size: 14px; color: #aaa; margin-bottom: 24px; }
    .empty a { display: inline-block; background: #f59e0b; color: white; text-decoration: none; padding: 13px 28px; border-radius: 10px; font-size: 15px; font-weight: 700; }

    .job-card { background: white; border-radius: 14px; margin-bottom: 14px; border: 1px solid #eee; overflow: hidden; transition: box-shadow 0.2s; }
    .job-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.07); }
    .job-inner { display: grid; grid-template-columns: 200px 1fr 1fr 140px; align-items: center; padding: 20px 24px; gap: 24px; }

    .load-col { display: flex; align-items: center; gap: 12px; }
    .load-icon { width: 48px; height: 48px; border-radius: 50%; background: #f59e0b; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .load-id { font-size: 11px; color: #bbb; font-weight: 600; letter-spacing: 0.5px; margin-bottom: 3px; }
    .load-name { font-size: 16px; font-weight: 800; color: #1a1a1a; margin-bottom: 5px; }
    .in-transit { display: inline-flex; align-items: center; gap: 4px; background: #dcfce7; color: #166534; font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 20px; }
    .status-dot { width: 5px; height: 5px; border-radius: 50%; background: #16a34a; }

    .driver-col { display: flex; align-items: center; gap: 10px; }
    .avatar { width: 40px; height: 40px; border-radius: 50%; background: #f3f4f6; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #555; flex-shrink: 0; }
    .driver-label { font-size: 11px; color: #aaa; margin-bottom: 2px; }
    .driver-name { font-size: 14px; font-weight: 600; color: #1a1a1a; }

    .route-col { display: flex; flex-direction: column; gap: 8px; }
    .route-row { display: flex; align-items: flex-start; gap: 8px; }
    .route-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
    .route-dot.from { background: #f59e0b; }
    .route-dot.to { background: #1a1a1a; }
    .r-label { font-size: 10px; color: #aaa; margin-bottom: 1px; }
    .r-addr { font-size: 13px; font-weight: 500; color: #1a1a1a; }

    .actions-col { display: flex; flex-direction: column; gap: 8px; }
    .btn-track { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 14px; border: 1.5px solid #e5e5e5; border-radius: 8px; font-size: 13px; font-weight: 600; color: #555; text-decoration: none; background: white; cursor: pointer; }
    .btn-track:hover { border-color: #f59e0b; color: #d97706; }
    .btn-done { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 14px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; color: white; background: #f59e0b; cursor: pointer; font-family: inherit; }
    .btn-done:hover { background: #d97706; }

    @media (max-width: 1024px) { .job-inner { grid-template-columns: 180px 1fr 140px; } .driver-col { display: none; } }
    @media (max-width: 768px) { .main { margin-left: 0; } .content { padding: 16px 16px 80px; } .job-inner { grid-template-columns: 1fr; } .route-col { display: none; } .topbar { padding: 16px 20px; } }

    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 1000;
      align-items: center; justify-content: center; padding: 20px;
    }
    .modal-overlay.visible { display: flex; }
    .modal-box {
      background: white; border-radius: 16px; padding: 28px 24px 24px;
      max-width: 380px; width: 100%; text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .modal-box h3 { font-size: 18px; font-weight: 800; color: #1a1a1a; margin-bottom: 8px; }
    .modal-box p { font-size: 14px; color: #888; line-height: 1.5; margin-bottom: 24px; }
    .modal-btns { display: flex; gap: 10px; }
    .modal-cancel {
      flex: 1; padding: 14px; border-radius: 10px;
      border: 1.5px solid #e5e5e5; background: white;
      color: #555; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit;
    }
    .modal-cancel:hover { border-color: #ccc; }
    .modal-confirm {
      flex: 1; padding: 14px; border-radius: 10px;
      border: none; background: #f59e0b;
      color: white; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit;
    }
    .modal-confirm:hover { background: #d97706; }
    .modal-confirm:disabled { background: #ddd; color: #999; cursor: not-allowed; }
  </style>
</head>
<body>
  <div id="sidebar-root"></div>

  <!-- Mark Delivered confirmation modal -->
  <div class="modal-overlay" id="completeModal">
    <div class="modal-box">
      <h3 id="modalTitle">Mark as Delivered?</h3>
      <p id="modalBody">This will end live tracking and move the job to History.</p>
      <div class="modal-btns">
        <button class="modal-cancel" onclick="hideCompleteModal()">Cancel</button>
        <button class="modal-confirm" id="modalConfirmBtn" onclick="confirmComplete()">Mark Delivered</button>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <img src="/logo.svg" alt="Drova" class="topbar-logo">
        <h1>Active Jobs</h1>
        <p>Jobs currently in transit</p>
      </div>
      <a href="/" class="new-btn">+ Create New Job</a>
    </div>
    <div class="content" id="content">
      <div style="padding:40px;text-align:center;color:#aaa;">Loading...</div>
    </div>
  </div>

  <script>
    document.getElementById('sidebar-root').innerHTML = renderSidebar('dispatcher');
    document.head.insertAdjacentHTML('beforeend', `<style>${SIDEBAR_CSS}</style>`);

    function initials(name) { return name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase(); }
    const LOAD_ICONS = {
      cattle: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="38" height="38"><path fill="black" d="M468.958 108.958c-27.507 2.08-48.997 7.94-71.375 22.572-5.333-2.214-12.62-17.738-16-16-11.82 6.08-14.892 19.555-4.916 32.817l-59.084 9.916c-24.776 3.341-49.567 4.838-74.187 5.334 1.326 3.832 2.96 7.636 4.812 10.05 5.219 6.802 20.323 6.21 21.07 14.75 1.935 22.098-24.876 47.415-47.056 47.057-15.401-.248-17.017-28.762-31.604-33.713-19.097-6.482-41.62 18.77-59.699 9.832-15.267-7.547-24.992-39.8-27.836-50.41-10.213-.127-20.327-.142-30.316.035-12.564.366-22.902 5.645-29.408 14.239-8.676 11.458-11.652 26.658-13.254 42.925-1.78 18.057 6.147 53.007 5.517 70.282-.504 13.85-7.493 11.87-11.912 18.888-13.52 21.47 8.894 20.83 17.014 5.56 12.482-23.473 4.253-63.11 7.195-92.974 1.855-35.76 10.597-23.937 15.664-24.588-4.2 13.065-6.21 30.962-7 51.334 6.895-2.342 36.498-11.6 42.73-.174 6.872 12.598-27.802 22.016-23.878 35.819 2.464 8.666 22.95 2.378 24.582 11.238 3.322 18.035-32.13 38.713-42.236 44.209.812 23.329 1.564 45.567 1.238 65.086H88.91c-4.234-16.543-12.038-49.944-4.06-55.084 21.425-18.091 29.836-37.484 42.732-56.428 8.755 2.556 16.92 4.787 24.782 6.672 3.553.972 7.244 1.771 10.984 2.44 24.859 4.967 61.553 5.678 90.783-.172 3.76 34.12 7.263 68.452 4.602 102.572h28.957c-12.375-26.902-4.263-65.044 13.892-86.27l44.934-33.462c24.881-16.384 42.93-37.996 55.982-63.38 30.402 3.413 57.086 3.29 77.192-.786l12.84-19.55c-24.257-17.857-43.3-36.585-62.948-58.13 10.063-14.533 25.027-22.765 39.375-32.506zm-39.375 54.572a8 8 0 1 1 0 16 8 8 0 0 1 0-16zM366.2 183.481c5.029 9.822-26.17 10.808-24.933 21.772.998 8.847 22.204 3.839 23.53 12.643 3.818 25.373-28.44 53.805-54.08 54.78-14.262.544-34.902-14.06-32.308-28.093 2.605-14.092 34.551-1.657 40.383-14.748 4.724-10.603-18.352-22.01-12.992-32.307 6.264-12.032 30.364-22.553 41.934-22.646 11.57-.093 15.606 3.347 18.466 8.6zm-26.585 126.346l-34.707 23.96 6.464 69.255h34.414c-11.783-22.454-15.58-55.506-6.171-93.215zm-204.561 1.41c-6.047 12.184-14.147 21.97-22.174 31.242 5.97 3.235 11.648 5.414 17.154 6.614 11.218 2.443 21.636.333 29.948-4.408 10.056-5.737 17.521-14.452 24.115-23.368-14.615-.869-32.96-2.962-49.043-10.08zm24.252 52c-8.737 2.585-17.452 3.7-25.566 2.96 5.167 12.624 10.45 24.152 15.824 36.845h28.306c-10.393-18.48-16.148-29.285-18.564-39.805z"/></svg>`,
      sheep: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="38" height="38"><path fill="black" d="M392.8 107.5c9.3 5.3 25.8 9.3 40 9.2 7.7-.1 14.6-1.2 19.5-3.2 5-1.8 6.9-4.9 8.9-8.8-9.2-6.08-22.1-12.27-31.8-12.87-14.9.53-28.8 8.13-36.6 15.67zm-253 20.2c-1.7 5.5-7.9 8.1-13 5.4-26.5-14.5-50.46-6.9-67.71 8.7-35.93 32.6-45.13 87.3-32.47 145.7 7.31 33.6 18.99 53 41.29 62.8 0 .1.1.1.15.1 2.22 1 4.21 1.9 6.09 2.8l4.61-22c1.02-4.9 5.8-8 10.66-7s7.98 5.8 6.96 10.7l-23.5 112c4.79 7.2 16.4 1.2 21.3-1.2l38.12-106.5c10.8-9.4 21.2-19 28.7-29.2 6.6-9.1 10.4-18.4 10.6-23.5.2-5 4.4-8.9 9.4-8.7 5 .2 9 4.6 8.6 9.6-.6 11.2-6.2 22.4-14 33.2-7.3 10-16.7 19.6-27.2 27.2l-3.3 8.9c6.9 8.7 13.4 13.8 19.6 16.8 8.8 4.1 17.7 4.6 28.5 3.3 16.4-1.9 34.6-12.9 43.5-37.2 2.8-7.7 13.6-8 16.8-.5 7.7 21.2 36.1 32.6 55.1 24l-3.9-23.3c-.8-4.9 2.5-9.6 7.4-10.4 4.9-.9 9.6 2.5 10.4 7.4l17.6 105.9c9.2 6.3 14.5 2.4 19.9-4.4l-13.8-114.4c-.7-5.3 3.3-10 8.6-10.2 4.8-.2 8.8 3.3 9.3 8l4.3 35.7c5.1-1.2 9.1-2.5 12.4-5 4.3-3.2 8.5-8.7 12.1-21.5 1.7-6 9-8.5 14.1-4.7 13.6 8.3 27.4-1.8 35.6-12.2 12.9-16.5 14.7-42.4 13.2-69.2-2.1.3-4.2.5-6.3.6-8.8.5-17.9-.9-25.7-4.4-12.4-7-22-18.4-28.2-28.9-3.9-6.8-7.3-13.7-10.5-20-5.4 9.9-11 23.1-19.2 25-12.5 2.1-23.9-3.7-29.8-12.7-5.9-8.9-7.4-20.2-4.8-31.1 2.7-11.7 9.8-38.3 22.6-56.1 2.2-2.9 4.5-5.3 6.8-7.4-7.5-3.1-16.2-3.8-22.9-3.8-5.8 0-13.5 1.8-19.7 5-6.2 3.3-10.7 7.8-12.2 11.8-3.2 8.5-15.5 7.5-17.3-1.3-3.8-22.78-53.9-17.8-65.6 2-3.8 7-14.1 5.9-16.5-1.7-8.1-22.61-62.7-21.3-66.7 5.9z"/></svg>`,
      horse: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="38" height="38"><path fill="black" d="M400 16c-21.335 9.73-58.244 17.34-73.086 48.232-22.36 1.948-72.753 10.673-122.22 40.25-58.098 34.74-116.017 97.417-131.776 213.702l-.48 3.537-2.774 2.25c-30.87 25.002-40.657 38.937-44.416 61.153-3.536 20.9-.72 51.46-.363 101.877H328.36c3.455-16.892 10.44-29.245 12.472-41.568 2.337-14.176.19-29.938-20.812-58.547-43.078-58.683-46.853-129.458-12.916-171.28-8.654-2.765-15.09-6.887-19.458-12.546-6.115-7.924-7.4-17.006-8.57-25.884l17.848-2.352c1.112 8.446 2.38 13.88 4.97 17.237 2.59 3.356 7.31 6.472 19.55 8.46l-.022.128.172-.17 5.998 9.424c19.957 31.358 42.84 51.292 73.332 54.44l6.51.672 1.367 6.4c2.74 12.828 8.626 19.095 15.116 22.238 6.49 3.143 14.225 2.944 20.47.205 9.316-4.086 14.518-11.35 16.7-22.712 2.122-11.05.546-25.834-5.137-42.106-33.538-38.248-44.475-87.277-63.903-128.772-6.055-9.947-12.448-18.518-20.385-24.856C376.808 55.126 386.456 34.852 400 16z"/></svg>`,
      pig: `<svg viewBox="0 0 60 60" width="30" height="30" xmlns="http://www.w3.org/2000/svg"><ellipse cx="12" cy="18" rx="10" ry="13" fill="black" transform="rotate(15,12,18)"/><ellipse cx="48" cy="18" rx="10" ry="13" fill="black" transform="rotate(-15,48,18)"/><circle cx="30" cy="33" r="23" fill="black"/><circle cx="30" cy="47" r="11" fill="#2a2a2a"/><circle cx="24" cy="47" r="3.5" fill="white" opacity="0.45"/><circle cx="36" cy="47" r="3.5" fill="white" opacity="0.45"/></svg>`,
      hay: `<svg viewBox="0 0 60 60" width="30" height="30" xmlns="http://www.w3.org/2000/svg"><rect x="5" y="12" width="50" height="36" rx="5" fill="black"/><rect x="5" y="19" width="50" height="3" rx="1.5" fill="white" opacity="0.45"/><rect x="5" y="27" width="50" height="3" rx="1.5" fill="white" opacity="0.45"/><rect x="5" y="35" width="50" height="3" rx="1.5" fill="white" opacity="0.45"/><rect x="19" y="12" width="5" height="36" rx="2" fill="white" opacity="0.55"/><rect x="36" y="12" width="5" height="36" rx="2" fill="white" opacity="0.55"/></svg>`,
      freight: `<svg viewBox="0 0 60 60" width="30" height="30" xmlns="http://www.w3.org/2000/svg"><rect x="2" y="18" width="36" height="26" rx="3" fill="black"/><rect x="36" y="26" width="20" height="18" rx="3" fill="black"/><rect x="38" y="29" width="14" height="10" rx="2" fill="white" opacity="0.3"/><circle cx="12" cy="46" r="7" fill="black"/><circle cx="12" cy="46" r="3.5" fill="white" opacity="0.4"/><circle cx="30" cy="46" r="7" fill="black"/><circle cx="30" cy="46" r="3.5" fill="white" opacity="0.4"/><circle cx="48" cy="46" r="7" fill="black"/><circle cx="48" cy="46" r="3.5" fill="white" opacity="0.4"/></svg>`,
    };

    function loadIcon(load) {
      const l = load.toLowerCase();
      let key = 'freight';
      if (l.includes('cattle') || l.includes('cow') || l.includes('bull') || l.includes('beef') || l.includes('hd')) key = 'cattle';
      else if (l.includes('sheep') || l.includes('lamb') || l.includes('ewe')) key = 'sheep';
      else if (l.includes('horse') || l.includes('mare') || l.includes('stallion') || l.includes('foal')) key = 'horse';
      else if (l.includes('pig') || l.includes('pork') || l.includes('sow')) key = 'pig';
      else if (l.includes('hay') || l.includes('grain') || l.includes('wheat') || l.includes('straw')) key = 'hay';
      return LOAD_ICONS[key];
    }
    function timeAgo(str) {
      const diff = Math.floor((Date.now() - new Date(str + 'Z')) / 60000);
      if (diff < 1) return 'Just now';
      if (diff < 60) return `${diff}m ago`;
      return `${Math.floor(diff/60)}h ${diff%60}m ago`;
    }

    async function load() {
      const res = await fetch('/jobs');
      const jobs = await res.json();
      const content = document.getElementById('content');

      if (!jobs.length) {
        content.innerHTML = `
          <div class="empty">
            <div class="empty-icon"><svg xmlns="http://www.w3.org/2000/svg" width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="#ddd" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 3h15v13H1z"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg></div>
            <h3>No active jobs</h3>
            <p>Create a new job to get started</p>
            <a href="/">+ Create New Job</a>
          </div>`;
        return;
      }

      content.innerHTML = `
        <div class="count">${jobs.length} job${jobs.length !== 1 ? 's' : ''} in transit</div>
        ${jobs.map(j => `
          <div class="job-card" id="job-${j.id}">
            <div class="job-inner">
              <div class="load-col">
                <div class="load-icon">${loadIcon(j.loadDetails)}</div>
                <div>
                  <div class="load-id">JOB #${j.id.toUpperCase()}</div>
                  <div class="load-name">${j.loadDetails}</div>
                  ${j.status === 'planned'
                    ? `<span class="in-transit" style="background:#f0ebe2;color:#92400e;"><span class="status-dot" style="background:#f59e0b;"></span> PLANNED</span>`
                    : `<span class="in-transit"><span class="status-dot"></span> ${j.jobType === 'empty' ? 'EMPTY RUN' : 'IN TRANSIT'}</span>`}
                </div>
              </div>
              <div class="driver-col">
                <div class="avatar">${initials(j.driverName)}</div>
                <div>
                  <div class="driver-label">Driver</div>
                  <div class="driver-name">${j.driverName}</div>
                  ${j.truckRego ? `<div style="font-size:11px;color:#aaa;font-weight:600;margin-top:2px;letter-spacing:0.3px;">🚛 ${j.truckRego}</div>` : ''}
                </div>
              </div>
              <div class="route-col">
                <div class="route-row">
                  <div class="route-dot from"></div>
                  <div><div class="r-label">From</div><div class="r-addr">${j.pickupAddress}</div></div>
                </div>
                <div class="route-row">
                  <div class="route-dot to"></div>
                  <div><div class="r-label">To</div><div class="r-addr">${j.deliveryAddress || '—'}</div></div>
                </div>
              </div>
              <div class="actions-col">
                ${j.status !== 'planned' ? `<a class="btn-track" href="/track/${j.id}?back=1" target="_blank">Client Tracker</a>` : ''}
                <a class="btn-track" href="/drive/${j.id}" target="_blank">Driver Link</a>
                <button class="btn-done" onclick="complete('${j.id}', ${j.jobType === 'empty'})">Mark ${j.jobType === 'empty' ? 'Arrived' : 'Delivered'}</button>
              </div>
            </div>
          </div>`).join('')}`;
    }

    let pendingCompleteId = null;

    function complete(id, isEmptyRun) {
      pendingCompleteId = id;
      const title = isEmptyRun ? 'Mark as Arrived?' : 'Mark as Delivered?';
      const body  = isEmptyRun
        ? 'This will mark the driver as arrived and move the job to History.'
        : 'This will end live tracking and move the job to History.';
      const btnLabel = isEmptyRun ? 'Mark Arrived' : 'Mark Delivered';
      document.getElementById('modalTitle').textContent = title;
      document.getElementById('modalBody').textContent  = body;
      const confirmBtn = document.getElementById('modalConfirmBtn');
      confirmBtn.textContent = btnLabel;
      confirmBtn.disabled = false;
      document.getElementById('completeModal').classList.add('visible');
    }

    function hideCompleteModal() {
      document.getElementById('completeModal').classList.remove('visible');
      pendingCompleteId = null;
    }

    async function confirmComplete() {
      if (!pendingCompleteId) return;
      const confirmBtn = document.getElementById('modalConfirmBtn');
      confirmBtn.disabled = true;
      confirmBtn.textContent = 'Saving…';
      const id = pendingCompleteId;
      try {
        await fetch(`/jobs/${id}/complete`, { method: 'POST' });
      } catch {}
      hideCompleteModal();
      const card = document.getElementById(`job-${id}`);
      if (card) {
        card.style.opacity = '0.4';
        card.style.pointerEvents = 'none';
        setTimeout(() => { card.remove(); if (!document.querySelectorAll('.job-card').length) load(); }, 500);
      }
    }

    // Close modal on overlay click
    document.getElementById('completeModal').addEventListener('click', function(e) {
      if (e.target === this) hideCompleteModal();
    });

    load().then(() => {
      const params = new URLSearchParams(location.search);
      const newId = params.get('created');
      if (newId) {
        history.replaceState({}, '', '/dispatcher');
        const banner = document.createElement('div');
        banner.style.cssText = 'background:#16a34a;color:white;padding:14px 20px;font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:space-between;gap:12px;';
        banner.innerHTML = `<span>✓ Job created! Use the Driver Link button on the card to send to your driver.</span><button onclick="this.parentNode.remove()" style="background:none;border:none;color:white;font-size:18px;cursor:pointer;padding:0 4px;">×</button>`;
        document.querySelector('.content').prepend(banner);
        setTimeout(() => banner.remove(), 8000);
      }
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Drova">
  <meta name="theme-color" content="#0f0f0f">
  <title>Drova — My Jobs</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      min-height: 100vh;
      color: #ffffff;
    }

    /* Header */
    .header {
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .header img { height: 36px; filter: brightness(0) invert(1); display: block; }
    .driver-info { display: flex; flex-direction: column; }
    .driver-label { font-size: 11px; color: #555; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .driver-name { font-size: 16px; font-weight: 800; color: #ffffff; }

    .header-right { display: flex; align-items: center; gap: 10px; }
    .btn-new {
      background: #f59e0b; color: white; text-decoration: none;
      padding: 9px 16px; border-radius: 10px; font-size: 14px; font-weight: 700;
      display: flex; align-items: center; gap: 6px;
    }
    .btn-new:hover { background: #d97706; }
    .btn-logout {
      background: #1a1a1a; color: #666; border: 1.5px solid #2a2a2a;
      padding: 9px 14px; border-radius: 10px; font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit;
    }
    .btn-logout:hover { color: #f87171; border-color: #f87171; }

    /* Content */
    .content { padding: 20px 16px 40px; max-width: 600px; margin: 0 auto; }
    .count { font-size: 13px; color: #555; font-weight: 600; margin-bottom: 16px; }

    /* Loading / empty */
    .loading { padding: 60px 20px; text-align: center; color: #444; font-size: 14px; }
    .empty {
      background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 20px;
      padding: 60px 20px; text-align: center;
    }
    .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty h3 { font-size: 18px; font-weight: 800; color: #ffffff; margin-bottom: 8px; }
    .empty p { font-size: 14px; color: #555; }

    /* Job card */
    .job-card {
      background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 16px;
      margin-bottom: 14px; overflow: hidden;
    }
    .job-card-inner { padding: 20px; }

    .job-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
    .job-id { font-size: 11px; color: #555; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 4px; }
    .customer-name { font-size: 18px; font-weight: 800; color: #ffffff; margin-bottom: 4px; }
    .load-details { font-size: 13px; color: #666; font-weight: 500; }

    .status-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700;
      flex-shrink: 0;
    }
    .status-dot { width: 5px; height: 5px; border-radius: 50%; }
    .status-active { background: rgba(22,163,74,0.15); color: #4ade80; }
    .status-active .status-dot { background: #4ade80; }
    .status-planned { background: rgba(245,158,11,0.15); color: #f59e0b; }
    .status-planned .status-dot { background: #f59e0b; }
    .status-pending { background: rgba(99,102,241,0.15); color: #a5b4fc; }
    .status-pending .status-dot { background: #818cf8; }

    /* Route */
    .route { margin-bottom: 18px; display: flex; flex-direction: column; gap: 0; }
    .route-line {
      display: flex; align-items: flex-start; gap: 12px; position: relative;
    }
    .route-line + .route-line { margin-top: 10px; }
    .route-dot-wrap {
      display: flex; flex-direction: column; align-items: center;
      flex-shrink: 0; padding-top: 2px;
    }
    .r-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .r-dot.from { background: #f59e0b; }
    .r-dot.to { background: #555; border: 2px solid #555; }
    .route-connector { width: 2px; height: 20px; background: #2a2a2a; margin: 4px 0; }
    .r-label { font-size: 11px; color: #555; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 2px; }
    .r-addr { font-size: 14px; color: #ccc; font-weight: 500; line-height: 1.35; }

    /* Action */
    .job-footer { border-top: 1px solid #2a2a2a; padding: 14px 20px; }
    .btn-start {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 15px;
      background: #f59e0b; color: white; text-decoration: none;
      border-radius: 12px; font-size: 16px; font-weight: 700;
      transition: background 0.2s;
    }
    .btn-start:hover { background: #d97706; }
    .btn-start svg { flex-shrink: 0; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-left">
      <img src="/logo.svg" alt="Drova">
      <div class="driver-info">
        <span class="driver-label">Signed in as</span>
        <span class="driver-name" id="driverName">Loading…</span>
      </div>
    </div>
    <div class="header-right">
      <a href="/index.html" class="btn-new" id="newJobBtn" style="display:none;">+ New Job</a>
      <button class="btn-logout" onclick="logout()">Sign out</button>
    </div>
  </div>

  <div class="content">
    <div id="jobs-container">
      <div class="loading">Loading your jobs…</div>
    </div>
  </div>

  <script>
    async function init() {
      let data;
      try {
        const res = await fetch('/api/driver/me');
        if (res.status === 401) { window.location.href = '/driver-login'; return; }
        data = await res.json();
      } catch {
        document.getElementById('jobs-container').innerHTML =
          '<div class="empty"><div class="empty-icon">⚠️</div><h3>Connection error</h3><p>Check your internet and try again.</p></div>';
        return;
      }

      document.getElementById('driverName').textContent = data.driverName || 'Driver';

      if (data.canEditJobs) {
        document.getElementById('newJobBtn').style.display = 'flex';
      }

      renderJobs(data.jobs || []);
    }

    function renderJobs(jobs) {
      const container = document.getElementById('jobs-container');

      if (!jobs.length) {
        container.innerHTML = `
          <div class="empty">
            <div class="empty-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 3h15v13H1z"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
            </div>
            <h3>No active jobs</h3>
            <p>You have no jobs assigned right now.</p>
          </div>`;
        return;
      }

      const countEl = document.createElement('div');
      countEl.className = 'count';
      countEl.textContent = `${jobs.length} job${jobs.length !== 1 ? 's' : ''} assigned to you`;

      const cards = jobs.map(j => {
        let statusClass = 'status-pending';
        let statusLabel = 'PENDING';
        if (j.status === 'planned') { statusClass = 'status-planned'; statusLabel = 'PLANNED'; }
        else if (j.startedAt) { statusClass = 'status-active'; statusLabel = j.jobType === 'empty' ? 'EMPTY RUN' : 'IN TRANSIT'; }

        const displayName = j.customerName || j.loadDetails;
        const loadSub = j.customerName ? j.loadDetails : '';

        return `
          <div class="job-card">
            <div class="job-card-inner">
              <div class="job-top">
                <div>
                  <div class="job-id">JOB #${j.id.toUpperCase()}</div>
                  <div class="customer-name">${displayName}</div>
                  ${loadSub ? `<div class="load-details">${loadSub}</div>` : ''}
                </div>
                <div class="status-badge ${statusClass}">
                  <span class="status-dot"></span>${statusLabel}
                </div>
              </div>
              <div class="route">
                <div class="route-line">
                  <div class="route-dot-wrap">
                    <div class="r-dot from"></div>
                    <div class="route-connector"></div>
                  </div>
                  <div>
                    <div class="r-label">Pickup</div>
                    <div class="r-addr">${j.pickupAddress || '—'}</div>
                  </div>
                </div>
                <div class="route-line">
                  <div class="route-dot-wrap" style="padding-top:2px;">
                    <div class="r-dot to"></div>
                  </div>
                  <div>
                    <div class="r-label">Delivery</div>
                    <div class="r-addr">${j.deliveryAddress || '—'}</div>
                  </div>
                </div>
              </div>
            </div>
            <div class="job-footer">
              <a class="btn-start" href="/drive/${j.id}">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>
                Start Trip
              </a>
            </div>
          </div>`;
      }).join('');

      container.innerHTML = '';
      container.appendChild(countEl);
      container.insertAdjacentHTML('beforeend', cards);
    }

    async function logout() {
      try {
        await fetch('/api/driver/logout', { method: 'POST' });
      } catch {}
      window.location.href = '/driver-login';
    }

    init();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Drova">
  <meta name="theme-color" content="#1a1a1a">
  <title>Drova — Fleet Map</title>
  <script src="/sidebar.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f0e8; min-height: 100vh; display: flex; }
    .main { margin-left: 220px; flex: 1; display: flex; flex-direction: column; min-width: 0; height: 100vh; }

    .topbar {
      background: white; padding: 16px 24px;
      border-bottom: 1px solid #eee;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .topbar h1 { font-size: 20px; font-weight: 800; color: #1a1a1a; }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .live-badge {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 700; color: #16a34a;
      background: #dcfce7; border: 1px solid #bbf7d0;
      padding: 5px 10px; border-radius: 20px;
    }
    .live-dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; animation: blink 1.4s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .driver-count { font-size: 13px; color: #888; font-weight: 500; }

    #map { flex: 1; width: 100%; }

    /* Driver info cards that appear on marker click */
    .info-card {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-width: 220px;
    }
    .info-driver { font-size: 14px; font-weight: 800; color: #1a1a1a; margin-bottom: 4px; }
    .info-load { font-size: 13px; color: #555; margin-bottom: 8px; }
    .info-row { font-size: 11px; color: #888; margin-bottom: 3px; }
    .info-row strong { color: #444; }
    .info-link {
      display: block; margin-top: 10px;
      background: #f59e0b; color: #1a1a1a;
      font-size: 12px; font-weight: 700;
      padding: 7px 12px; border-radius: 7px;
      text-decoration: none; text-align: center;
    }
    .info-link:hover { background: #fbbf24; }

    /* No drivers state */
    .no-drivers {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      text-align: center; color: #aaa; pointer-events: none;
      z-index: 10;
    }
    .no-drivers-icon { font-size: 40px; margin-bottom: 12px; }
    .no-drivers-text { font-size: 15px; font-weight: 600; }
    .no-drivers-sub { font-size: 13px; margin-top: 4px; }

    @media (max-width: 768px) {
      .main { margin-left: 0; height: auto; min-height: 100vh; }
      #map { height: calc(100vh - 106px); }
    }
  </style>
</head>
<body>
  <div id="sidebar-root"></div>
  <div class="main">
    <div class="topbar">
      <h1>Fleet Map</h1>
      <div class="topbar-right">
        <span class="driver-count" id="driverCount">Loading…</span>
        <div class="live-badge"><div class="live-dot"></div> LIVE</div>
      </div>
    </div>
    <div style="position:relative;flex:1;display:flex;flex-direction:column;">
      <div id="map"></div>
      <div class="no-drivers" id="noDrivers" style="display:none;">
        <div class="no-drivers-icon">🚛</div>
        <div class="no-drivers-text">No active drivers</div>
        <div class="no-drivers-sub">Drivers will appear here once a job is started</div>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('sidebar-root').innerHTML = renderSidebar('fleet');
    document.head.insertAdjacentHTML('beforeend', `<style>${SIDEBAR_CSS}</style>`);

    let gmap, markers = {}, infoWindow;
    const AUSTRALIA = { lat: -25.2744, lng: 133.7751 };

    function timeAgo(iso) {
      if (!iso) return 'never';
      const diff = Math.floor((Date.now() - new Date(iso.endsWith('Z') ? iso : iso + 'Z')) / 60000);
      if (diff < 1) return 'just now';
      if (diff < 60) return `${diff}m ago`;
      const h = Math.floor(diff / 60);
      return h < 24 ? `${h}h ago` : `${Math.floor(h/24)}d ago`;
    }

    function truckIcon(fresh) {
      const color = fresh ? '#f59e0b' : '#9ca3af';
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 44 44">
        <circle cx="22" cy="22" r="20" fill="${color}" stroke="white" stroke-width="2.5"/>
        <text x="22" y="27" text-anchor="middle" font-size="18" fill="white">🚛</text>
      </svg>`;
      return {
        url: 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg),
        scaledSize: new google.maps.Size(44, 44),
        anchor: new google.maps.Point(22, 22),
      };
    }

    function infoContent(job) {
      const ageMin = job.lastLocationAt
        ? Math.floor((Date.now() - new Date(job.lastLocationAt.endsWith('Z') ? job.lastLocationAt : job.lastLocationAt + 'Z')) / 60000)
        : null;
      const fresh = ageMin !== null && ageMin < 15;
      return `<div class="info-card">
        <div class="info-driver">🚛 ${job.driverName || 'Unknown driver'}</div>
        <div class="info-load">${job.loadDetails || '—'}</div>
        <div class="info-row"><strong>Delivering to:</strong> ${job.deliveryAddress || '—'}</div>
        ${job.customerName ? `<div class="info-row"><strong>Customer:</strong> ${job.customerName}</div>` : ''}
        <div class="info-row"><strong>GPS:</strong> ${ageMin !== null ? (fresh ? `Updated ${timeAgo(job.lastLocationAt)}` : `⚠ Last update ${timeAgo(job.lastLocationAt)}`) : 'No signal yet'}</div>
        <a class="info-link" href="/track/${job.id}" target="_blank">Open tracking link →</a>
      </div>`;
    }

    function updateMarkers(jobs) {
      const activeJobs = jobs.filter(j => j.currentLat && j.currentLng);

      document.getElementById('noDrivers').style.display = activeJobs.length === 0 ? 'block' : 'none';
      document.getElementById('driverCount').textContent =
        activeJobs.length === 0 ? 'No active drivers' :
        `${activeJobs.length} driver${activeJobs.length !== 1 ? 's' : ''} on the road`;

      const seen = new Set();
      activeJobs.forEach(job => {
        seen.add(job.id);
        const pos = { lat: +job.currentLat, lng: +job.currentLng };
        const ageMin = job.lastLocationAt
          ? Math.floor((Date.now() - new Date(job.lastLocationAt.endsWith('Z') ? job.lastLocationAt : job.lastLocationAt + 'Z')) / 60000)
          : null;
        const fresh = ageMin !== null && ageMin < 15;

        if (markers[job.id]) {
          markers[job.id].setPosition(pos);
          markers[job.id].setIcon(truckIcon(fresh));
        } else {
          const marker = new google.maps.Marker({
            position: pos, map: gmap,
            icon: truckIcon(fresh),
            title: job.driverName || 'Driver',
            zIndex: 10,
          });
          marker.addListener('click', () => {
            infoWindow.setContent(infoContent(job));
            infoWindow.open(gmap, marker);
          });
          markers[job.id] = marker;
        }
      });

      // Remove markers for completed/no-position jobs
      Object.keys(markers).forEach(id => {
        if (!seen.has(id)) { markers[id].setMap(null); delete markers[id]; }
      });

      // Fit bounds to all markers on first load
      if (activeJobs.length > 0 && Object.keys(markers).length === activeJobs.length) {
        const bounds = new google.maps.LatLngBounds();
        activeJobs.forEach(j => bounds.extend({ lat: +j.currentLat, lng: +j.currentLng }));
        if (activeJobs.length === 1) {
          gmap.setCenter({ lat: +activeJobs[0].currentLat, lng: +activeJobs[0].currentLng });
          gmap.setZoom(10);
        } else {
          gmap.fitBounds(bounds, { top: 60, right: 60, bottom: 60, left: 60 });
        }
      }
    }

    async function loadJobs() {
      try {
        const jobs = await fetch('/jobs').then(r => r.json());
        updateMarkers(jobs);
      } catch {}
    }

    window.__fleetInit = async function() {
      infoWindow = new google.maps.InfoWindow();
      gmap = new google.maps.Map(document.getElementById('map'), {
        center: AUSTRALIA, zoom: 5,
        mapTypeId: 'roadmap',
        mapTypeControl: false,
        streetViewControl: false,
        fullscreenControl: false,
        styles: [{ featureType: 'poi', stylers: [{ visibility: 'off' }] }],
      });
      await loadJobs();
      setInterval(loadJobs, 10000);
    };

    fetch('/api/config').then(r => r.json()).then(cfg => {
      const s = document.createElement('script');
      s.src = `https://maps.googleapis.com/maps/api/js?key=${cfg.googleMapsKey}&callback=__fleetInit`;
      s.async = true;
      document.head.appendChild(s);
    });
  </script>
</body>
</html>

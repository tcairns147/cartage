<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Drova">
  <meta name="theme-color" content="#1a1a1a">
  <title>Drova — Job History</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f0e8; min-height: 100vh; display: flex; }
  </style>
  <script src="/sidebar.js"></script>
</head>
<body>
  <div id="sidebar-root"></div>

  <div class="main">
    <div class="topbar">
      <div>
        <img src="/logo.svg" alt="Drova" class="topbar-logo">
        <h1>Job History</h1>
        <p>Completed deliveries</p>
      </div>
    </div>
    <div class="content">
      <div class="card" id="historyCard">
        <div class="loading">Loading...</div>
      </div>
    </div>
  </div>

  <style>
    .main { margin-left: 220px; flex: 1; }
    .topbar { background: white; padding: 16px 32px 20px; border-bottom: 1px solid #eee; }
    .topbar-logo { height: 52px; margin-bottom: 8px; display: block; }
    .topbar h1 { font-size: 22px; font-weight: 800; color: #1a1a1a; }
    .topbar p { font-size: 13px; color: #aaa; margin-top: 2px; }
    .content { padding: 24px 32px; }
    .card { background: white; border-radius: 16px; border: 1px solid #eee; overflow: hidden; }
    .loading { padding: 40px; text-align: center; color: #aaa; font-size: 14px; }
    .empty { padding: 80px 20px; text-align: center; }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty h3 { font-size: 18px; font-weight: 700; color: #1a1a1a; margin-bottom: 6px; }
    .empty p { font-size: 14px; color: #aaa; }
    table { width: 100%; border-collapse: collapse; }
    thead { background: #fafafa; }
    th { padding: 12px 20px; text-align: left; font-size: 11px; font-weight: 700; color: #aaa; letter-spacing: 0.5px; text-transform: uppercase; border-bottom: 1px solid #eee; }
    td { padding: 16px 20px; border-bottom: 1px solid #f9f9f9; font-size: 14px; color: #333; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }
    .load-cell { font-weight: 600; color: #1a1a1a; }
    .route-cell { color: #888; font-size: 13px; }
    .done-badge { display: inline-flex; align-items: center; gap: 4px; background: #dcfce7; color: #166534; font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 20px; }
    .job-id { font-size: 11px; color: #bbb; font-weight: 600; letter-spacing: 0.5px; }
    @media (max-width: 768px) { .main { margin-left: 0; } .content { padding: 16px 16px 80px; } th:nth-child(3), td:nth-child(3), th:nth-child(4), td:nth-child(4), th:nth-child(5), td:nth-child(5) { display: none; } }
  </style>

  <script>
    document.getElementById('sidebar-root').innerHTML = renderSidebar('history');
    document.head.insertAdjacentHTML('beforeend', `<style>${SIDEBAR_CSS}</style>`);

    function formatDate(str) {
      return new Date(str + 'Z').toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' });
    }
    function formatTime(str) {
      return new Date(str + 'Z').toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit', hour12: true });
    }

    async function load() {
      const res = await fetch('/jobs/history');
      const jobs = await res.json();
      const card = document.getElementById('historyCard');

      if (!jobs.length) {
        card.innerHTML = `<div class="empty"><div class="empty-icon"><svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ddd" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="2" width="8" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M9 12h6M9 16h4"/></svg></div><h3>No completed jobs yet</h3><p>Completed jobs will appear here.</p></div>`;
        return;
      }

      card.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Job</th>
              <th>Customer</th>
              <th>Driver</th>
              <th>Route</th>
              <th>Distance</th>
              <th>Date &amp; Time</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>
            ${jobs.map(j => `
              <tr>
                <td>
                  <div class="job-id">JOB #${j.id.toUpperCase()}</div>
                  <div class="load-cell">${j.jobType === 'empty' ? 'Empty Run' : j.loadDetails}</div>
                </td>
                <td>${j.customerName || '—'}<br><span style="font-size:12px;color:#bbb;">${j.customerMobile || ''}</span></td>
                <td>${j.driverName}</td>
                <td class="route-cell">
                  ${j.pickupAddress || '—'}${j.jobType !== 'empty' ? `<br>→ ${j.deliveryAddress || '—'}` : ''}
                </td>
                <td style="white-space:nowrap;">
                  ${j.distanceTravelledKm ? `<span style="font-size:15px;font-weight:700;color:#1a1a1a;">${Math.round(j.distanceTravelledKm)} km</span>` : '<span style="color:#ccc;">—</span>'}
                </td>
                <td>
                  <div>${formatDate(j.createdAt)}</div>
                  <div style="font-size:12px;color:#aaa;">${formatTime(j.createdAt)}</div>
                </td>
                <td><span class="done-badge">${j.jobType === 'empty' ? 'Collected' : 'Delivered'}</span></td>
              </tr>`).join('')}
          </tbody>
        </table>`;
    }

    load();
  </script>
</body>
</html>

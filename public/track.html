<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png">
  <link rel="apple-touch-icon" sizes="167x167" href="/icon-167.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Drova">
  <meta name="theme-color" content="#1a1a1a">
  <title>Drova — Track Your Delivery</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f0e8; min-height: 100vh; }

    .header {
      background: #1a1a1a;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo img { height: 44px; filter: brightness(0) invert(1); display: block; }
    .live-pill {
      display: none;
      align-items: center;
      gap: 6px;
      background: #dcfce7;
      color: #166534;
      font-size: 12px;
      font-weight: 700;
      padding: 5px 12px;
      border-radius: 20px;
    }
    .live-pill.visible { display: flex; }
    .live-dot { width: 7px; height: 7px; border-radius: 50%; background: #16a34a; animation: blink 1.4s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    #map { height: 52vh; width: 100%; }

    .bottom-sheet {
      background: white;
      border-radius: 20px 20px 0 0;
      margin-top: -16px;
      position: relative;
      z-index: 10;
      padding: 20px 20px 32px;
      min-height: 48vh;
    }

    .sheet-handle {
      width: 36px; height: 4px;
      background: #e5e5e5;
      border-radius: 2px;
      margin: 0 auto 20px;
    }

    .job-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; }

    .job-id { font-size: 11px; color: #bbb; font-weight: 600; letter-spacing: 0.5px; margin-bottom: 4px; }
    .job-load { font-size: 22px; font-weight: 800; color: #1a1a1a; }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #fef3c7;
      color: #92400e;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
      margin-top: 4px;
    }

    .eta-card {
      background: #f5f0e8;
      border-radius: 14px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .eta-left {}
    .eta-label { font-size: 12px; color: #888; margin-bottom: 4px; }
    .eta-value { font-size: 36px; font-weight: 900; color: #f59e0b; line-height: 1; }
    .eta-sub { font-size: 12px; color: #aaa; margin-top: 3px; }

    .eta-truck { font-size: 40px; }

    .divider { height: 1px; background: #f5f5f5; margin: 0 0 16px; }

    .detail-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #f9f9f9;
    }

    .detail-row:last-child { border-bottom: none; }

    .detail-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
    .detail-label { font-size: 11px; color: #aaa; margin-bottom: 2px; }
    .detail-value { font-size: 14px; font-weight: 500; color: #1a1a1a; }

    .driver-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #f9f9f9;
    }

    .driver-left { display: flex; align-items: center; gap: 10px; }
    .driver-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: #fef3c7;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 700; color: #92400e;
    }
    .driver-label { font-size: 11px; color: #aaa; margin-bottom: 2px; }
    .driver-name { font-size: 14px; font-weight: 600; color: #1a1a1a; }

    .delivered-screen {
      display: none;
      text-align: center;
      padding: 80px 20px;
      background: white;
      min-height: 100vh;
    }

    .delivered-screen .tick { font-size: 72px; margin-bottom: 20px; }
    .delivered-screen h2 { font-size: 28px; font-weight: 800; color: #166534; margin-bottom: 10px; }
    .delivered-screen p { font-size: 16px; color: #888; }
  </style>
</head>
<body>

  <div id="trackingView" style="display:none">
    <div class="header">
      <div class="logo"><img src="/logo.svg" alt="Drova"></div>
      <div class="live-pill" id="livePill"><div class="live-dot"></div> LIVE GPS</div>
    </div>

    <div id="map"></div>

    <div class="bottom-sheet">
      <div class="sheet-handle"></div>

      <div class="job-header">
        <div>
          <div class="job-id" id="jobIdDisplay"></div>
          <div class="job-load" id="loadDetails">—</div>
        </div>
        <div class="status-pill">In Transit</div>
      </div>

      <div class="eta-card">
        <div class="eta-left">
          <div class="eta-label">Estimated Arrival</div>
          <div class="eta-value" id="etaDisplay">--</div>
          <div class="eta-sub" id="etaSub">Calculating route...</div>
        </div>
        <div class="eta-truck"><svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#d1d5db" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 3h15v13H1z"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg></div>
      </div>

      <div class="divider"></div>

      <div class="driver-row">
        <div class="driver-left">
          <div class="driver-avatar" id="driverInitials">?</div>
          <div>
            <div class="driver-label">Driver</div>
            <div class="driver-name" id="driverName">—</div>
          </div>
        </div>
      </div>

      <div class="detail-row">
        <div class="detail-icon"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a7 7 0 0 1 7 7c0 5-7 13-7 13S5 14 5 9a7 7 0 0 1 7-7z"/><circle cx="12" cy="9" r="2.5"/></svg></div>
        <div>
          <div class="detail-label">Pickup</div>
          <div class="detail-value" id="pickupAddress">—</div>
        </div>
      </div>

      <div class="detail-row">
        <div class="detail-icon"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a7 7 0 0 1 7 7c0 5-7 13-7 13S5 14 5 9a7 7 0 0 1 7-7z"/><circle cx="12" cy="9" r="2.5"/></svg></div>
        <div>
          <div class="detail-label">Delivering to</div>
          <div class="detail-value" id="deliveryAddress">—</div>
        </div>
      </div>
    </div>
  </div>

  <div class="delivered-screen" id="deliveredScreen">
    <div class="tick"><svg xmlns="http://www.w3.org/2000/svg" width="72" height="72" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="9 12 11 14 15 10"/></svg></div>
    <h2>Delivered!</h2>
    <p>Your load has been delivered successfully.<br>Thank you for using Drova.</p>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const jobId = window.location.pathname.split('/').pop();

    const truckIcon = L.divIcon({ html: '<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="#f59e0b" stroke="#1a1a1a" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 3h15v13H1z"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>', className: '', iconSize: [32, 32], iconAnchor: [16, 16] });

    const map = L.map('map', { zoomControl: false });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);

    let truckMarker = null;
    let routeCoords = [];
    let simStep = 0, simInterval = null, etaSeconds = 0;

    async function geocode(address) {
      const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}&countrycodes=au&limit=1`, { headers: { 'Accept-Language': 'en' } });
      const data = await res.json();
      return data.length ? [parseFloat(data[0].lat), parseFloat(data[0].lon)] : null;
    }

    async function getRoadRoute(pickup, delivery) {
      const res = await fetch(`https://router.project-osrm.org/route/v1/driving/${pickup[1]},${pickup[0]};${delivery[1]},${delivery[0]}?overview=full&geometries=geojson`);
      const data = await res.json();
      if (data.code !== 'Ok') return null;
      return { coords: data.routes[0].geometry.coordinates.map(([lng, lat]) => [lat, lng]), duration: data.routes[0].duration };
    }

    function resample(coords, steps) {
      const result = [];
      for (let i = 0; i <= steps; i++) {
        const t = i / steps * (coords.length - 1);
        const idx = Math.floor(t);
        const frac = t - idx;
        const a = coords[Math.min(idx, coords.length - 1)];
        const b = coords[Math.min(idx + 1, coords.length - 1)];
        result.push([a[0] + (b[0] - a[0]) * frac, a[1] + (b[1] - a[1]) * frac]);
      }
      return result;
    }

    function updateEta(secs) {
      if (secs <= 0) {
        document.getElementById('etaDisplay').textContent = 'Arrived';
        document.getElementById('etaSub').textContent = 'Awaiting confirmation';
        return;
      }
      const h = Math.floor(secs / 3600);
      const m = Math.floor((secs % 3600) / 60);
      document.getElementById('etaDisplay').textContent = h > 0 ? `${h}h ${m}m` : `${m} min`;
      document.getElementById('etaSub').textContent = 'estimated arrival';
    }

    function moveTruck(latlng) {
      if (!truckMarker) truckMarker = L.marker(latlng, { icon: truckIcon }).addTo(map);
      else truckMarker.setLatLng(latlng);
      map.panTo(latlng);
    }

    function getInitials(name) {
      return name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
    }

    async function loadJob() {
      const res = await fetch(`/jobs/${jobId}`);
      if (!res.ok) { document.body.innerHTML = '<p style="padding:40px;color:#888;">Job not found.</p>'; return; }
      const job = await res.json();

      if (job.status === 'complete') { showDelivered(); return; }

      document.getElementById('trackingView').style.display = 'block';
      document.getElementById('jobIdDisplay').textContent = `JOB #${job.id.toUpperCase()}`;
      document.getElementById('loadDetails').textContent = job.loadDetails;
      document.getElementById('driverName').textContent = job.driverName;
      document.getElementById('driverInitials').textContent = getInitials(job.driverName);
      document.getElementById('pickupAddress').textContent = job.pickupAddress;
      document.getElementById('deliveryAddress').textContent = job.deliveryAddress;

      let pickup = (job.pickupLat && job.pickupLng) ? [job.pickupLat, job.pickupLng] : await geocode(job.pickupAddress);
      let delivery = (job.deliveryLat && job.deliveryLng) ? [job.deliveryLat, job.deliveryLng] : await geocode(job.deliveryAddress);
      if (!pickup) pickup = [-32.2569, 148.6011];
      if (!delivery) delivery = [-33.2832, 149.1000];

      const route = await getRoadRoute(pickup, delivery);
      const rawCoords = (route && route.coords.length >= 2) ? route.coords : [pickup, delivery];
      etaSeconds = route ? Math.round(route.duration) : 7200;

      const totalSteps = 240;
      routeCoords = resample(rawCoords, totalSteps);

      L.marker(pickup, { title: 'Pickup' }).addTo(map);
      L.marker(delivery, { title: 'Delivery' }).addTo(map);
      L.polyline(routeCoords, { color: '#f59e0b', weight: 5, opacity: 0.8 }).addTo(map);
      map.fitBounds(L.polyline(routeCoords).getBounds(), { padding: [40, 40] });

      if (job.currentLat && job.currentLng) {
        startLive(job, delivery);
      } else {
        moveTruck(routeCoords[0]);
        updateEta(etaSeconds);
        simInterval = setInterval(() => {
          simStep++;
          etaSeconds = Math.max(0, etaSeconds - 1);
          if (simStep >= totalSteps) { clearInterval(simInterval); moveTruck(routeCoords[routeCoords.length - 1]); updateEta(0); return; }
          moveTruck(routeCoords[simStep]);
          updateEta(etaSeconds);
        }, 1000);
      }
    }

    function startLive(job, delivery) {
      document.getElementById('livePill').classList.add('visible');
      if (simInterval) { clearInterval(simInterval); simInterval = null; }

      async function poll() {
        const res = await fetch(`/jobs/${jobId}`);
        const j = await res.json();
        if (j.status === 'complete') { showDelivered(); return; }
        if (j.currentLat && j.currentLng) {
          moveTruck([j.currentLat, j.currentLng]);
          const dlat = delivery[0] - j.currentLat, dlng = delivery[1] - j.currentLng;
          const distKm = Math.sqrt(dlat * dlat + dlng * dlng) * 111;
          updateEta(Math.round(distKm / 80 * 3600));
        }
        setTimeout(poll, 5000);
      }

      moveTruck([job.currentLat, job.currentLng]);
      updateEta(etaSeconds);
      setTimeout(poll, 5000);
    }

    function showDelivered() {
      document.getElementById('trackingView').style.display = 'none';
      document.getElementById('deliveredScreen').style.display = 'block';
    }

    loadJob();
  </script>
</body>
</html>

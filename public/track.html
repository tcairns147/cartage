<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drova — Track Your Delivery</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f4f4f4;
      min-height: 100vh;
    }

    .header {
      background: #1a1a1a;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo { font-size: 20px; font-weight: 800; color: #f59e0b; }
    .job-tag { font-size: 13px; color: #666; }

    #map { height: 55vh; width: 100%; }

    .info-card {
      background: white;
      margin: 16px;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }

    .eta-block {
      text-align: center;
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid #f0f0f0;
    }

    .eta-label { font-size: 13px; color: #888; margin-bottom: 4px; }
    .eta-value { font-size: 36px; font-weight: 700; color: #d97706; }
    .eta-sub { font-size: 13px; color: #aaa; margin-top: 2px; }

    .live-badge {
      display: inline-block;
      background: #dcfce7;
      color: #166534;
      font-size: 12px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      margin-top: 6px;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 8px 0;
      border-bottom: 1px solid #f9f9f9;
      font-size: 14px;
    }

    .detail-row:last-child { border-bottom: none; }
    .detail-label { color: #888; font-size: 13px; }
    .detail-value { color: #1a1a1a; font-weight: 500; text-align: right; max-width: 60%; }

    .status-badge {
      display: inline-block;
      background: #fef3c7;
      color: #92400e;
      font-size: 12px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
    }

    .delivered-screen {
      display: none;
      text-align: center;
      padding: 60px 20px;
    }

    .delivered-screen .tick { font-size: 64px; margin-bottom: 16px; }
    .delivered-screen h2 { font-size: 24px; color: #166534; margin-bottom: 8px; }
    .delivered-screen p { color: #888; font-size: 15px; }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">DROVA</div>
    <div class="job-tag">Live Tracking</div>
  </div>

  <div id="trackingView">
    <div id="map"></div>
    <div class="info-card">
      <div class="eta-block">
        <div class="eta-label">Estimated Arrival</div>
        <div class="eta-value" id="etaDisplay">--:--</div>
        <div class="eta-sub" id="etaSub">Calculating...</div>
        <div class="live-badge" id="liveBadge" style="display:none">● LIVE GPS</div>
      </div>
      <div class="detail-row">
        <span class="detail-label">Driver</span>
        <span class="detail-value" id="driverName">—</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Load</span>
        <span class="detail-value" id="loadDetails">—</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Pickup</span>
        <span class="detail-value" id="pickupAddress">—</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Delivering to</span>
        <span class="detail-value" id="deliveryAddress">—</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Status</span>
        <span class="detail-value"><span class="status-badge">In Transit</span></span>
      </div>
    </div>
  </div>

  <div class="delivered-screen" id="deliveredScreen">
    <div class="tick">✅</div>
    <h2>Delivered!</h2>
    <p>Your load has been delivered successfully.<br>Thank you for using Drova.</p>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const jobId = window.location.pathname.split('/').pop();

    const truckIcon = L.divIcon({
      html: '🚛',
      className: '',
      iconSize: [32, 32],
      iconAnchor: [16, 16]
    });

    const map = L.map('map');
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    let truckMarker = null;
    let routeCoords = [];
    let simStep = 0;
    let simInterval = null;
    let usingLiveGPS = false;
    let etaSeconds = 0;

    async function geocode(address) {
      const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}&countrycodes=au&limit=1`;
      const res = await fetch(url, { headers: { 'Accept-Language': 'en' } });
      const data = await res.json();
      if (!data.length) return null;
      return [parseFloat(data[0].lat), parseFloat(data[0].lon)];
    }

    async function getRoadRoute(pickup, delivery) {
      const url = `https://router.project-osrm.org/route/v1/driving/${pickup[1]},${pickup[0]};${delivery[1]},${delivery[0]}?overview=full&geometries=geojson`;
      const res = await fetch(url);
      const data = await res.json();
      if (data.code !== 'Ok') return null;
      return {
        coords: data.routes[0].geometry.coordinates.map(([lng, lat]) => [lat, lng]),
        durationSecs: data.routes[0].duration
      };
    }

    function resample(coords, steps) {
      const result = [];
      for (let i = 0; i <= steps; i++) {
        const t = i / steps * (coords.length - 1);
        const idx = Math.floor(t);
        const frac = t - idx;
        const a = coords[Math.min(idx, coords.length - 1)];
        const b = coords[Math.min(idx + 1, coords.length - 1)];
        result.push([a[0] + (b[0] - a[0]) * frac, a[1] + (b[1] - a[1]) * frac]);
      }
      return result;
    }

    function updateEtaDisplay(secs) {
      if (secs <= 0) {
        document.getElementById('etaDisplay').textContent = 'Arrived';
        document.getElementById('etaSub').textContent = 'Awaiting confirmation';
        return;
      }
      const h = Math.floor(secs / 3600);
      const m = Math.floor((secs % 3600) / 60);
      if (h > 0) {
        document.getElementById('etaDisplay').textContent = `${h}h ${m}m`;
      } else {
        document.getElementById('etaDisplay').textContent = `${m} min`;
      }
      document.getElementById('etaSub').textContent = 'estimated arrival';
    }

    function moveTruckTo(latlng) {
      if (!truckMarker) {
        truckMarker = L.marker(latlng, { icon: truckIcon }).addTo(map);
      } else {
        truckMarker.setLatLng(latlng);
      }
      map.panTo(latlng);
    }

    async function loadJob() {
      const res = await fetch(`/jobs/${jobId}`);
      if (!res.ok) {
        document.body.innerHTML = '<p style="padding:40px;color:#888;">Job not found.</p>';
        return;
      }
      const job = await res.json();

      if (job.status === 'complete') { showDelivered(); return; }

      document.getElementById('driverName').textContent = job.driverName;
      document.getElementById('loadDetails').textContent = job.loadDetails;
      document.getElementById('pickupAddress').textContent = job.pickupAddress;
      document.getElementById('deliveryAddress').textContent = job.deliveryAddress;
      document.getElementById('etaSub').textContent = 'Loading route...';

      let pickup = (job.pickupLat && job.pickupLng) ? [job.pickupLat, job.pickupLng] : await geocode(job.pickupAddress);
      let delivery = (job.deliveryLat && job.deliveryLng) ? [job.deliveryLat, job.deliveryLng] : await geocode(job.deliveryAddress);
      if (!pickup) pickup = [-32.2569, 148.6011];
      if (!delivery) delivery = [-33.2832, 149.1000];

      const route = await getRoadRoute(pickup, delivery);
      let rawCoords = (route && route.coords.length >= 2) ? route.coords : [pickup, delivery];
      etaSeconds = route ? Math.round(route.durationSecs) : 7200;

      const totalSteps = 240;
      routeCoords = resample(rawCoords, totalSteps);

      L.marker(pickup).addTo(map).bindPopup('Pickup');
      L.marker(delivery).addTo(map).bindPopup('Delivery');
      L.polyline(routeCoords, { color: '#d97706', weight: 4, opacity: 0.6 }).addTo(map);
      map.fitBounds(L.polyline(routeCoords).getBounds(), { padding: [40, 40] });

      // If driver has real GPS, use it; otherwise simulate
      if (job.currentLat && job.currentLng) {
        startLiveTracking(job, delivery);
      } else {
        startSimulation(totalSteps);
      }
    }

    function startSimulation(totalSteps) {
      updateEtaDisplay(etaSeconds);
      moveTruckTo(routeCoords[0]);

      simInterval = setInterval(() => {
        simStep++;
        etaSeconds = Math.max(0, etaSeconds - 1);
        if (simStep >= totalSteps) {
          clearInterval(simInterval);
          moveTruckTo(routeCoords[routeCoords.length - 1]);
          updateEtaDisplay(0);
          return;
        }
        moveTruckTo(routeCoords[simStep]);
        updateEtaDisplay(etaSeconds);
      }, 1000);
    }

    function startLiveTracking(job, delivery) {
      usingLiveGPS = true;
      document.getElementById('liveBadge').style.display = 'inline-block';

      if (simInterval) { clearInterval(simInterval); simInterval = null; }

      // Poll server every 5 seconds for driver location
      async function poll() {
        const res = await fetch(`/jobs/${jobId}`);
        const j = await res.json();

        if (j.status === 'complete') { showDelivered(); return; }

        if (j.currentLat && j.currentLng) {
          const pos = [j.currentLat, j.currentLng];
          moveTruckTo(pos);

          // Rough ETA: straight-line distance at ~80km/h
          const dlat = delivery[0] - j.currentLat;
          const dlng = delivery[1] - j.currentLng;
          const distKm = Math.sqrt(dlat * dlat + dlng * dlng) * 111;
          etaSeconds = Math.round(distKm / 80 * 3600);
          updateEtaDisplay(etaSeconds);
        }

        setTimeout(poll, 5000);
      }

      moveTruckTo([job.currentLat, job.currentLng]);
      updateEtaDisplay(etaSeconds);
      setTimeout(poll, 5000);
    }

    function showDelivered() {
      document.getElementById('trackingView').style.display = 'none';
      document.getElementById('deliveredScreen').style.display = 'block';
    }

    loadJob();
  </script>
</body>
</html>
